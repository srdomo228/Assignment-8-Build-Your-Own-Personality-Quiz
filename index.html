<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personality Quiz</title>
    <link rel="icon" type="image/x-icon" href="/img/ideas.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href ="./css/style.css">
</head>
<body>
    <h1 class="text-center mt-4">YOUR QUIZ TITLE HERE</h1>
    
    <!-- Start quiz element -->

<div class="question-block mb-5" data-question="1">
    <h3 class="mb-4">1. How do you usually spend your Friday night?</h3>
    <div class="d-grid gap-3">
        <button class="answer-btn btn btn-outline-primary text-start" data-value="1">Chilling at home with headphones on</button>
        <button class="answer-btn btn btn-outline-primary text-start" data-value="2">Going to a small local concert or show</button>
        <button class="answer-btn btn btn-outline-primary text-start" data-value="4">Raging at a big festival or club</button>
        <button class="answer-btn btn btn-outline-primary text-start" data-value="3">Hanging with friends, talking or freestyling</button>
    </div>
</div>

<div class="question-block mb-5" data-question="2">
    <h3 class="mb-4">2. When you’re feeling stressed, what kind of music helps you the most?</h3>
    <div class="d-grid gap-3">
        <button class="answer-btn btn btn-outline-primary text-start" data-value="1">Calm beats or lo-fi to relax</button>
        <button class="answer-btn btn btn-outline-primary text-start" data-value="2">Emotional indie or alternative songs</button>
        <button class="answer-btn btn btn-outline-primary text-start" data-value="3">Motivational rap or hip-hop</button>
        <button class="answer-btn btn btn-outline-primary text-start" data-value="4">High-energy electronic or dance music</button>
    </div>
</div>

<div class="question-block mb-5" data-question="3">
    <h3 class="mb-4">3. What’s most important to you in a song?</h3>
    <div class="d-grid gap-3">
        <button class="answer-btn btn btn-outline-primary text-start" data-value="1">The chill vibe and atmosphere</button>
        <button class="answer-btn btn btn-outline-primary text-start" data-value="2">Deep lyrics and emotion</button>
        <button class="answer-btn btn btn-outline-primary text-start" data-value="3">Strong rhythm and clever wordplay</button>
        <button class="answer-btn btn btn-outline-primary text-start" data-value="4">The drop and energy</button>
    </div>
</div>

<div class="question-block mb-5" data-question="4">
    <h3 class="mb-4">4. Which best describes your personality?</h3>
    <div class="d-grid gap-3">
        <button class="answer-btn btn btn-outline-primary text-start" data-value="1">Laid-back and creative</button>
        <button class="answer-btn btn btn-outline-primary text-start" data-value="2">Dreamy and a little rebellious</button>
        <button class="answer-btn btn btn-outline-primary text-start" data-value="3">Confident and outgoing</button>
        <button class="answer-btn btn btn-outline-primary text-start" data-value="4">Energetic and adventurous</button>
    </div>
</div>

<!-- End quiz element -->

    <!-- Add more quiz elements here -->



    <div class="text-center mt-5">
        <button id="result-button" class="btn btn-success btn-lg px-5 py-3">
          Give Me The Results
        </button>
      </div>
    <!-- Output the result here -->
    <div class="container d-flex justify-content-center">
      <div id="result-container" class="mt-5">
        <h3>Your Result:</h3>
        <p id="result-text"></p>
      </div>
    </div>
    
    <!-- Connect to your script file here -->
     <script src = "./js/script.js"></script>
</body>
</html>
